{% load static %}
<!doctype html><html lang="en"><head><meta charset="utf-8"><title>Dashboard — GameHub</title><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="{% static 'css/style.css' %}"></head><body><header class="topbar"><div class="container"><div class="brand">GameHub</div></div></header><main class="container py-4"><h1>Admin Dashboard</h1><a class="btn" href="/games/upload/">Upload new game</a><div class="list">{% for g in games %}<div class="list-item"><strong>{{ g.title }}</strong> — {{ g.category.name if g.category else '' }} — {{ g.updated_at|date:"Y-m-d" }}</div>{% empty %}<p>No games yet.</p>{% endfor %}</div></main><footer class="site-footer"><div class="container">© GameHub</div></footer></body></html>
